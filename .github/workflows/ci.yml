name: Release quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, test, build, and audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Check out exact source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Use Node.js 22.13
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22.13.0
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Render and behavior tests
        run: npm test

      - name: Build Netlify production target
        run: npm run build:netlify

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Install Chromium for browser verification
        run: npx playwright install --with-deps chromium

      - name: Exercise desktop and mobile journeys
        run: npm run test:e2e

      - name: Upload browser evidence on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-evidence
          path: output/playwright
          if-no-files-found: ignore
          retention-days: 7
