name: Release quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, test, build, and audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Check out exact source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Use Node.js 22.13
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.13.0
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Render and behavior tests
        run: npm test

      - name: Build Netlify production target
        run: npm run build:netlify

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Install Chromium for browser verification
        run: npx playwright install --with-deps chromium

      - name: Exercise desktop and mobile journeys
        run: npm run test:e2e

      - name: Upload browser evidence on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-evidence
          path: output/playwright
          if-no-files-found: ignore
          retention-days: 7
