version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
      include:
        - "*"
    groups:
      react-stack:
        patterns:
          - "react"
          - "react-dom"
          - "react-server-dom-webpack"
          - "@types/react"
          - "@types/react-dom"
        update-types:
          - "minor"
          - "patch"
      vite-rsc-stack:
        dependency-type: "development"
        patterns:
          - "vinext"
          - "vite"
          - "@vitejs/*"
          - "@cloudflare/vite-plugin"
        update-types:
          - "minor"
          - "patch"
      runtime-minor-and-patch:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      tooling-minor-and-patch:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "America/Chicago"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
